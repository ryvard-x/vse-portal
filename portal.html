<!DOCTYPE html>
<html>
<head>
  <title>V.S.E Portal</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #000000, #1a0033);
      color: #c084fc;
      text-align: center;
      font-family: 'Times New Roman';
      padding-top: 100px;
    }

    h1 {
      text-shadow: 0 0 20px purple;
    }

    p {
      color: #ddd;
    }
  </style>
</head>

<body>

<h1>Registrasi</h1>

<div class="box">
<h2>Registrasi member</h2>

<input type="text" id="nama" placeholder="Nama"><br><br>
<input type="number" id="umur" placeholder="Umur"><br><br>
<textarea id="alasan" placeholder="Alasan ingin masuk"></textarea><br><br>
<button onclick="kirimData()">Submit</button>
</div>

<div id="kartu"></div>

<style>
body{
background:black;
color:white;
font-family:'Times New Roman';
text-align:center;
padding-top:50px;
}

.box{
width:320px;
margin:auto;
padding:20px;
border:2px solid #a855f7;
box-shadow:0 0 20px #a855f7;
border-radius:15px;
background:#111;
}

input, textarea{
width:90%;
padding:10px;
border:none;
border-radius:8px;
}

button{
padding:10px 20px;
background:#a855f7;
color:white;
border:none;
border-radius:10px;
}

#kartu{
margin-top:30px;
}
.card{
width:320px;
margin:auto;
padding:20px;
border:2px solid cyan;
box-shadow:0 0 20px cyan;
border-radius:15px;
background:#111;
}
</style>

<script>
function kirimData() {
let nama = document.getElementById("nama").value.trim();
let umur = document.getElementById("umur").value.trim();
let alasan = document.getElementById("alasan").value.trim();

if(nama.length < 3 || nama.length > 30){
alert("⚠️ Nama harus 3 sampai 30 huruf!");
return;
}

if(umur < 3 || umur > 50){
alert("⚠️ Umur harus 3 sampai 50 tahun!");
return;
}

if(alasan.length < 5 || alasan.length > 50){
alert("⚠️ Alasan harus 5 sampai 50 huruf!");
return;
}

localStorage.setItem("nama", nama);
localStorage.setItem("umur", umur);
localStorage.setItem("alasan", alasan);

document.getElementById("loadingLogo").style.display = "block";

setTimeout(function(){
window.location.href = "wa.html";
},1500);
}
















   











  





</script>





















<div id="loadingLogo" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:9999; text-align:center;">
<img src="logo.png" style="width:220px; margin-top:45%; animation:spin 1.2s linear infinite;">
</div>

<style>
@keyframes spin {
from {transform:rotate(0deg);}
to {transform:rotate(360deg);}
}
</style>
</body>






</html>
