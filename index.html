<!DOCTYPE html>
<html>
<head>
  <title>V.S.E Portal</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #1a0033, #000);
      color: white;
      font-family: 'Times New Roman;
      text-align: center;
    }

    h1 {
      margin: 0;
      padding: 20px;
      color: #c084fc;
      text-shadow: 0 0 20px #a855f7;
      animation:pulseJudul 2.5s infinite;
    }

    .card {
      background: rgba(20, 0, 50, 0.8);
      margin: 20px;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 25px #7a2fff;
      transition: 0.3s;
      cursor:pointer;
      position:relative;
overflow:hidden;
    }

    .card:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 0 25px #b266ff, 0 0 45px #7a2fff;
border:1px solid #d9b3ff;
    }
    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px #c084fc;
    }

    .btn {
      background: linear-gradient(45deg, #7a2fff, #c084fc);
      padding: 10px 20px;
      border-radius: 10px;
      color: white;
      border: none;
      cursor: pointer;
    }

    .floating {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #c084fc;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 30px;   line-height: 60px;
      box-shadow: 0 0 25px purple;
    }

    





















    @keyframes pulseJudul{
0%{
transform:scale(1);
text-shadow:0 0 10px #b266ff, 0 0 20px #7a2fff;
}
50%{
transform:scale(1.05);
text-shadow:0 0 20px #ffffff, 0 0 35px #b266ff;
}
100%{
transform:scale(1);
text-shadow:0 0 10px #b266ff, 0 0 20px #7a2fff;
}
    }
    .card::before{
content:"";
position:absolute;
top:-2px;
left:-2px;
right:-2px;
bottom:-2px;
background:linear-gradient(45deg,#00ffff,#8a2be2,#ff00ff,#00ffff);
background-size:400% 400%;
z-index:-1;
border-radius:18px;
animation:borderJalan 6s linear infinite;
}

@keyframes borderJalan{
0%{background-position:0% 50%;}
100%{background-position:400% 50%;}
      }

    #startupScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
animation:hilangStartup 3s forwards;
}

#startupLogo{
width:90px;
height:90px;
object-fit:contain;
border-radius:50%;
animation:spin 2s linear infinite;
}











#startupScreen h2{
color:white;
margin-top:20px;
text-shadow:0 0 15px #7a2fff;
}

@keyframes hilangStartup{
0%,80%{opacity:1;}
100%{opacity:0; visibility:hidden;}
}
    .meteors{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow:hidden;
pointer-events:none;
z-index:-1;
}

.meteors span{
position:absolute;
width:3px;
height:100px;
background:linear-gradient(white, transparent);
opacity:0.8;
transform:rotate(45deg);
animation:jatuhMeteor 2s linear infinite;
}

@keyframes jatuhMeteor{
0%{
transform:translate(0,0) rotate(45deg);
opacity:1;
}
100%{
transform:translate(-600px,600px) rotate(45deg);
opacity:0;
}
      }
  </style>
</head>
<body>
<div class="meteors">  
  <span style="left:10%; animation-delay:0s;"></span>
<span style="left:30%; animation-delay:0.5s;"></span>
<span style="left:50%; animation-delay:1s;"></span>
<span style="left:70%; animation-delay:1.5s;"></span>
<span style="left:90%; animation-delay:2s;"></span>
  

    
    
</div>
  <div id="startupScreen">
  <img src="logo.png" id="startupLogo">
  <h2>Initializing V.S.E...</h2>
  </div>
  
  
  <h1>V.S.E PORTAL</h1>
<div class="card">
  <h2>🚪 Gerbang Masuk</h2>
  <p>Akses sistem utama V.S.E</p>
  <a href="portal.html" onclick="showLogo(event)">
<button class="btn">Masuk</button>
  </a>
    
 
</div>

<a href="astro.html" style="text-decoration:none; color:white;">
<div class="card">
<h2>🔭 Data Astronomi</h2>
<p>Penelitian dan observasi luar angkasa</p>
</div>
</a>
  
  


<a href="komunitas.html" style="text-decoration:none; color:white;">
<div class="card">
<h2>👥 Komunitas</h2>
<p>Bergabung dengan member V.S.E</p>
</div>
</a>
  


<div class="floating">+</div>
<div id="loadingLogo" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:9999; text-align:center;">
<img src="logo.png" id="spinLogo" style="width:220px; margin-top:45%; animation:spin 1.2s linear infinite;">
</div>

<style>
@keyframes spin {
from {transform:rotate(0deg);}
to {transform:rotate(360deg);}
}
</style>

<script>
function showLogo(event){
event.preventDefault();
document.getElementById("loadingLogo").style.display="block";
setTimeout(function(){
window.location.href="portal.html";
},1500);
}
</script>
</body>
</html>
